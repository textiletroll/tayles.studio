<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stitch Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cabinet">
    <div id="marquee">STITCH ARCADE</div>

    <div id="screen">
      <canvas id="game" width="480" height="480"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-row">
          <span class="hud-label">SCORE</span>
          <span id="hud-score">0</span>
        </div>
        <div class="hud-row">
          <span class="hud-label">DONE</span>
          <span id="hud-progress">0%</span>
        </div>
      </div>

      <div id="overlay"></div>
    </div>

    <div id="controls">
      <span class="key">&larr;</span> <span class="key">&rarr;</span> TURN
      <span class="key">&darr;</span> SLOW
      <span class="key">SPACE</span> STOP
      <span class="key">ENTER</span> CONFIRM
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/shapes.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
  <script src="js/tutorial.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
